services:
  postgres:
    image: postgres:16-alpine
    container_name: registerkaro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-registerkaro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-registerkaro}
      POSTGRES_DB: ${POSTGRES_DB:-registerkaro}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-registerkaro}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - registerkaro

  redis:
    image: redis:7-alpine
    container_name: registerkaro-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - registerkaro

  minio:
    image: minio/minio:latest
    container_name: registerkaro-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - registerkaro

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin};
      mc mb local/${S3_BUCKET:-registerkaro-documents} --ignore-existing;
      exit 0;
      "
    networks:
      - registerkaro

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: registerkaro-api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - registerkaro

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
    container_name: registerkaro-web
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - registerkaro

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    container_name: registerkaro-worker
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      REDIS_URL: redis://redis:6379
      API_URL: http://api:3001
      HEADLESS: ${HEADLESS:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - registerkaro
    shm_size: '1gb'

  caddy:
    image: caddy:2-alpine
    container_name: registerkaro-caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    networks:
      - registerkaro

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:

networks:
  registerkaro:
    driver: bridge
